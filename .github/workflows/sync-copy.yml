name: Sync website copy

on:
  push:
    branches: [master]
    paths: ['website-copy.md']

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run copy sync
        run: node scripts/sync-copy.js

      - name: Commit updated HTML (if any)
        run: |
          git config user.name "copy-sync[bot]"
          git config user.email "noreply@github.com"
          git add index.html ecopools.html projects.html land-management.html contact.html
          git diff --cached --quiet || git commit -m "Sync copy from website-copy.md [skip ci]"
          git push
